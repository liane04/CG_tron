<!DOCTYPE html>
<html>
<head>
    <title>NEON DRIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        canvas { display: block; }

        /* HUD durante o jogo (desligado em modo menu) */
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffff;
            font-size: 13px;
            text-shadow: 0 0 6px #00ffff;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        #hud-luzes {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
        }

        /* Loader simples até o módulo principal arrancar */
        #boot {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff2bd6;
            font-size: 20px;
            letter-spacing: 6px;
            text-shadow: 0 0 8px #ff2bd6;
            background: #05000d;
            z-index: 200;
            transition: opacity 0.6s ease;
        }
        #boot.oculto { opacity: 0; pointer-events: none; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.173.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.173.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20/dist/lil-gui.esm.min.js"
            }
        }
    </script>
</head>
<body>
    <div id="boot">LOADING…</div>

    <!-- HUD durante o jogo -->
    <div id="info">
        [C] Câmara &nbsp; [ESC] Menu
    </div>

    <div id="hud-luzes">
        <span id="hud-l1"></span>
        <span id="hud-l2"></span>
        <span id="hud-l3"></span>
        <span id="hud-l4"></span>
        <span id="hud-l5"></span>
    </div>

    <script src="./js/main.js" type="module"></script>
</body>
</html>
