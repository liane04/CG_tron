<!DOCTYPE html>
<html>
<head>
    <title>NEON DRIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
        }
        canvas { display: block; }

        /* HUD durante o jogo (desligado em modo menu) */
        #info {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            font-size: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 6px #00ffff;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        /* Loader simples até o módulo principal arrancar */
        #boot {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00eaff;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: 10px;
            text-shadow:
                0 0 12px #00eaff,
                0 0 24px #00eaff,
                0 0 48px #ff2bd6;
            background: radial-gradient(ellipse at center, #0a0420 0%, #02000a 70%);
            z-index: 200;
            transition: opacity 0.6s ease;
        }
        #boot::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg,
                    rgba(0, 234, 255, 0.04) 0px,
                    rgba(0, 234, 255, 0.04) 1px,
                    transparent 1px,
                    transparent 3px);
            pointer-events: none;
        }
        #boot.oculto { opacity: 0; pointer-events: none; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.173.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.173.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20/dist/lil-gui.esm.min.js"
            }
        }
    </script>
</head>
<body>
    <div id="boot">LOADING…</div>

    <!-- HUD durante o jogo -->
    <div id="info">
        [V] 3ª Pessoa &nbsp; [B] Topo &nbsp; [C] Alternar &nbsp; [ESC] Menu
    </div>

    <script src="./js/main.js" type="module"></script>
</body>
</html>
